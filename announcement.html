<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Announcements | Safety First</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/announcements.css">

</head>

<body>

<header class="topbar">

    <div class="logo">

        <img src="images/logo.png" alt="Logo">

        <span>Safety First</span>

    </div>

    <div class="topbar-right">

        <div class="notification-container">

            <button id="notificationBell" class="bell">

                <i class="fa-solid fa-bell"></i>

                <span id="notificationCount">0</span>

            </button>

            <div id="notificationPanel" class="notification-panel">

                <h3>Notifications</h3>

                <div id="notificationList">

                    No notifications.

                </div>

            </div>

        </div>

        <span id="welcomeUser">

            Welcome

        </span>

        <button id="logoutBtn" class="logout-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Sign Out

        </button>

    </div>

</header>

<div class="dashboard">

    <aside class="sidebar">

        <h2>MENU</h2>

        <ul>

            <li onclick="window.location.href='dashboard.html'">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </li>

            <li class="active">

                <i class="fa-solid fa-bullhorn"></i>

                Announcements

            </li>

            <li onclick="window.location.href='guides.html'">

                <i class="fa-solid fa-book"></i>

                Safety Guides

            </li>

            <li onclick="window.location.href='contacts.html'">

                <i class="fa-solid fa-phone"></i>

                Emergency Contacts

            </li>

            <li onclick="window.location.href='profile.html'">

                <i class="fa-solid fa-user"></i>

                Profile

            </li>

        </ul>

    </aside>

    <main class="content">

        <div class="card">

            <h1 class="page-title">

                <i class="fa-solid fa-bullhorn"></i>

                Announcements

            </h1>

            <input
                type="text"
                id="searchAnnouncement"
                class="search-box"
                placeholder="🔍 Search announcements..."
            >

            <br><br>

            <div id="announcementList">

                Loading announcements...

            </div>

        </div>

    </main>

</div>

<script type="module"
src="js/pages/announcements.js"></script>

</body>

<script type="module" src="js/pages/announcements.js"></script>

<script type="module" src="js/components/notifications.js"></script>

</html>
