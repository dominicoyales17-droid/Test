<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Announcements | Safety First</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<header class="topbar">

<div class="logo">

<img src="images/logo.png" class="logo-img">

<span>Safety First</span>

</div>

<div class="user-area">

<span id="adminName">Administrator</span>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Sign Out

</button>

</div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<div class="card">

<h2>

<i class="fa-solid fa-bullhorn"></i>

Create Announcement

</h2>

<br>

<input
id="title"
type="text"
placeholder="Announcement title">

<br><br>

<textarea
id="message"
rows="6"
placeholder="Write your announcement..."></textarea>

<br><br>

<select id="priority">

<option>General</option>
<option>Important</option>
<option>Emergency</option>

</select>

<br><br>

<button id="postBtn">

<i class="fa-solid fa-paper-plane"></i>

Post Announcement

</button>

</div>

<br>

<div class="card">

<h2>

<i class="fa-solid fa-clock-rotate-left"></i>

Recent Announcements

</h2>

<br>

<div id="recentAnnouncements">

Loading...

</div>

</div>

</main>

</div>

<script type="module" src="js/pages/admin.js"></script>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("announcements");

</script>

</body>

</html>
