<!DOCTYPE html>
<html>
<head>
    <title>Audio Test</title>
</head>
<body>

<button id="play">Play Sound</button>

<script>
const audio = new Audio("./sounds/notification.wav");

document.getElementById("play").onclick = () => {
    audio.currentTime = 0;
    audio.play()
        .then(() => console.log("Playing"))
        .catch(err => console.error(err));
};
</script>

</body>
</html>
