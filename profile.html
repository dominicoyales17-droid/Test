<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | Safety First</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/dashboard-v2.css">
    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

<header class="topbar-v2">

    <div class="topbar-left">

        <button id="menuBtn" class="icon-btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="brand">

            <img src="images/JRCA LOGO.jpg" class="brand-logo">

            <div class="brand-text">
                <h2>JESUS REIGNS CHRISTIAN ACADEMY</h2>
                <span>Safety Information and Preparedness Management System</span>
            </div>

        </div>

    </div>

    <div class="topbar-right">

        <button id="notificationBell" class="icon-btn">

            <i class="fa-solid fa-bell"></i>

            <span id="notificationCount">0</span>

        </button>

    </div>

</header>

<div id="notificationPanel" class="notification-panel">

    <h3>Notifications</h3>

    <div id="notificationList">

        No notifications.

    </div>

</div>

<div class="dashboard">

    <aside class="sidebar"></aside>

    <main class="content">

        <section class="page-header">

            <h1>
                👤 My Profile
            </h1>

            <p>
                Manage your account information and personalize your profile.
            </p>

        </section>

        <div class="profile-layout">

            <!-- LEFT CARD -->

            <section class="profile-card">

                <div class="profile-header">

                    <img
                        id="profileImage"
                        src="images/default-profile.png"
                        class="profile-image"
                        alt="Profile">

                    <button
                        id="changePhotoBtn"
                        class="secondary-btn">

                        <i class="fa-solid fa-camera"></i>

                        Change Photo

                    </button>

                </div>

            </section>

            <!-- RIGHT CARD -->

            <section class="profile-card">

                <h2 class="profile-section-title">

                    Account Overview

                </h2>

                <div class="profile-info-grid">

                    <div class="info-box">

                        <i class="fa-solid fa-user"></i>

                        <div>

                            <small>Username</small>

                            <strong id="overviewUsername">

                                -

                            </strong>

                        </div>

                    </div>

                    <div class="info-box">

                        <i class="fa-solid fa-envelope"></i>

                        <div>

                            <small>Email</small>

                            <strong id="overviewEmail">

                                -

                            </strong>

                        </div>

                    </div>

                    <div class="info-box">

                        <i class="fa-solid fa-user-shield"></i>

                        <div>

                            <small>Role</small>

                            <strong id="overviewRole">

                                -

                            </strong>

                        </div>

                    </div>

                    <div class="info-box">

                        <i class="fa-solid fa-circle-check"></i>

                        <div>

                            <small>Status</small>

                            <strong>

                                Active

                            </strong>

                        </div>

                    </div>

                </div>

                <h2 class="profile-section-title">

                    Edit Information

                </h2>

                <form class="profile-form">

                    <div class="form-group">

                        <label>Username</label>

                        <input
                            type="text"
                            id="username">

                    </div>

                    <div class="form-group">

                        <label>Email</label>

                        <input
                            type="email"
                            id="email"
                            readonly>

                    </div>

                    <div class="form-group">

                        <label>Role</label>

                        <input
                            type="text"
                            id="role"
                            readonly>

                    </div>

                    <div class="form-group">

                        <label>Bio</label>

                        <textarea
                            id="bio"
                            rows="5"></textarea>

                    </div>

                    <div class="button-group">

                        <button
                            type="button"
                            id="saveProfile"
                            class="primary-btn">

                            <i class="fa-solid fa-floppy-disk"></i>

                            Save Changes

                        </button>

                        <button
                            type="button"
                            id="changePassword"
                            class="secondary-btn">

                            <i class="fa-solid fa-key"></i>

                            Change Password

                        </button>

                        <button
                            type="button"
                            id="logoutBtn"
                            class="logout-btn">

                            <i class="fa-solid fa-right-from-bracket"></i>

                            Sign Out

                        </button>

                    </div>

                </form>

            </section>

        </div>

    </main>

</div>

<!-- Change Password Modal -->

<div id="passwordModal" class="modal">

    <div class="modal-content">

        <h2>

            <i class="fa-solid fa-key"></i>

            Change Password

        </h2>

        <input
            type="password"
            id="newPassword"
            placeholder="Enter new password">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm password">

        <div class="modal-buttons">

            <button
                id="cancelPassword"
                class="secondary-btn">

                Cancel

            </button>

            <button
                id="confirmPasswordBtn"
                class="primary-btn">

                Update Password

            </button>

        </div>

    </div>

</div>

<script type="module" src="js/pages/profile.js"></script>

<script type="module">

import { loadStudentSidebar }
from "./js/components/studentSidebar.js";

loadStudentSidebar("profile");

</script>

</body>

</html>
