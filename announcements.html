<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Announcements | Safety First</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/theme.css">

    <link rel="stylesheet" href="css/dashboard-v2.css">

    <link rel="stylesheet" href="css/announcements.css">
    
</head>

<body>

<header class="topbar-v2">

    <div class="topbar-left">

        <button id="menuBtn" class="icon-btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="brand">

            <img src="images/JRCA LOGO.jpg" class="brand-logo">

            <div class="brand-text">

                <h2 class="desktop-title">
                    JESUS REIGNS CHRISTIAN ACADEMY
                </h2>

                <h2 class="mobile-title">
                    JRCA
                </h2>

                <span class="desktop-subtitle">
                    Safety Information and Preparedness Management System
                </span>

                <span class="mobile-subtitle">
                    SIPMS
                </span>

            </div>

        </div>

    </div>

    <div class="topbar-right">

        <button id="notificationBell" class="icon-btn">

            <i class="fa-solid fa-bell"></i>

            <span id="notificationCount">0</span>

        </button>

    </div>

</header>

<div id="notificationPanel" class="notification-panel">

    <h3>Notifications</h3>

    <div id="notificationList">

        No notifications.

    </div>

</div>

<div class="dashboard">

    <aside class="sidebar"></aside>

    <main class="content">

        <section class="page-header">

            <h1>Announcements</h1>

            <p>
                View the latest school announcements, emergency alerts, and campus safety updates.
            </p>

        </section>

        <section class="search-section">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="searchAnnouncement"
                    placeholder="Search announcements...">

            </div>

        </section>

        <section
            id="announcementList"
            class="announcement-grid">

            <div class="announcement-loading">

                <i class="fa-solid fa-spinner fa-spin"></i>

                <p>Loading announcements...</p>

            </div>

        </section>

    </main>

</div>

<script type="module">

import { loadStudentSidebar }
from "./js/components/studentSidebar.js";

loadStudentSidebar("announcements");

</script>

<script type="module" src="js/pages/announcements.js"></script>

<script type="module" src="js/components/notifications.js"></script>

</body>

</html>
