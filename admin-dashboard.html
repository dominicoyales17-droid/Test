<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | Safety First</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<header class="topbar">

    <div class="logo">

        <img src="images/logo.png" class="logo-img">

        <span>Safety First</span>

    </div>

    <div class="user-area">

        <span id="adminName">Administrator</span>

        <button id="logoutBtn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Sign Out

        </button>

    </div>

</header>

<div class="dashboard">

<aside class="sidebar"></aside>

<main class="content">

<div class="hero-card">

<h1>

👋 Welcome, Administrator

</h1>

<p>

Manage your Safety First system from one place.

</p>

</div>

<div class="stats-grid">

<div class="stat-card">

<i class="fa-solid fa-users"></i>

<h2 id="totalUsers">0</h2>

<p>Total Users</p>

</div>

<div class="stat-card">

<i class="fa-solid fa-user-graduate"></i>

<h2 id="totalStudents">0</h2>

<p>Students</p>

</div>

<div class="stat-card">

<i class="fa-solid fa-user-shield"></i>

<h2 id="totalAdmins">0</h2>

<p>Admins</p>

</div>

<div class="stat-card">

<i class="fa-solid fa-bullhorn"></i>

<h2 id="totalAnnouncements">0</h2>

<p>Announcements</p>

</div>

</div>

<div class="card">

<h2>

Quick Actions

</h2>

<br>

<button onclick="location.href='admin-announcement.html'">

📢 Manage Announcements

</button>

<br><br>

<button onclick="location.href='users.html'">

👥 User Management

</button>

<br><br>

<button onclick="location.href='reports.html'">

📊 Reports

</button>

</div>

</main>

</div>

<script type="module" src="js/pages/admin-dashboard.js"></script>

<script type="module">

import { loadAdminSidebar }
from "./js/components/adminSidebar.js";

loadAdminSidebar("dashboard");

</script>

</body>

</html>
