<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Log In</h1>

    <input
        type="email"
        id="loginEmail"
        placeholder="Email Address"
    >

    <input
        type="password"
        id="loginPassword"
        placeholder="Password"
    >

    <button id="loginBtn">

        Log In

    </button>

    <br><br>

    <a href="signup.html">

        Create an Account

    </a>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
