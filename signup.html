<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Safety First | Sign Up</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">

            <img src="images/logo.png" alt="Safety First Logo">

            <h1>Safety First</h1>

            <p>

                Create your account to access the Safety Information &
                Preparedness Management System

            </p>

        </div>

        <form id="signupForm">

            <div class="form-group">

                <label>Username</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    required>

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                    required>

            </div>

            <button
                type="button"
                id="signupBtn"
                class="primary-btn">

                Create Account

            </button>

        </form>

        <div class="auth-footer">

            <p>

                Already have an account?

                <a href="login.html">

                    Sign In

                </a>

            </p>

        </div>

    </div>

</div>

<script type="module" src="js/auth.js"></script>

</body>

</html>
