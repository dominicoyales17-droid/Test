<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety First Admin</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topbar">

    <div class="logo">
        🛡 <span>Safety First</span>
    </div>

    <div class="user-area">
        <span id="welcomeUser">Admin</span>

        <button id="logoutBtn">
            Sign Out
        </button>
    </div>

</header>

<div class="dashboard">

    <aside class="sidebar">

        <h2>Admin Menu</h2>

        <ul>

            <li class="active">🏠 Dashboard</li>

            <li>📢 Announcements</li>

            <li>👥 Users</li>

            <li>📊 Reports</li>

            <li>⚙ Settings</li>

        </ul>

    </aside>

    <main class="content">

        <div class="card">

            <h2>📢 Create Announcement</h2>

            <input
                type="text"
                id="title"
                placeholder="Announcement Title"
            >

            <br><br>

            <textarea
                id="message"
                rows="6"
                placeholder="Write your announcement..."
            ></textarea>

            <br><br>

            <select id="priority">

                <option value="Normal">🟢 Normal</option>
                <option value="Important">🟠 Important</option>
                <option value="Emergency">🔴 Emergency</option>

            </select>

            <br><br>

            <button id="postBtn">

                Post Announcement

            </button>

        </div>

        <div class="card">

            <h2>📢 Recent Announcements</h2>

            <div id="announcementList">

                No announcements yet.

            </div>

        </div>

    </main>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
