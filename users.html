<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Management | Safety First</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/users.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="topbar">

    <div class="logo">

        <img src="images/logo.png" class="logo-img">

        <span>Safety First</span>

    </div>

    <div class="user-area">

        <span id="adminName"></span>

        <button id="logoutBtn" class="btn-primary">

            <i class="fa-solid fa-right-from-bracket"></i>

            Sign Out

        </button>

    </div>

</header>

<div class="dashboard">

    <aside class="sidebar">

        <h2>ADMIN MENU</h2>

        <ul>

            <li onclick="window.location.href='admin.html'">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </li>

            <li onclick="window.location.href='announcement.html'">

                <i class="fa-solid fa-bullhorn"></i>

                Announcements

            </li>

            <li class="active">

                <i class="fa-solid fa-users"></i>

                User Management

            </li>

            <li onclick="window.location.href='reports.html'">

                <i class="fa-solid fa-chart-column"></i>

                Reports

            </li>

            <li onclick="window.location.href='settings.html'">

                <i class="fa-solid fa-gear"></i>

                Settings

            </li>

        </ul>

    </aside>

    <main class="content">

        <div class="card">

            <h2>

                <i class="fa-solid fa-users"></i>

                User Management

            </h2>

            <br>

            <div id="usersTable">

                Loading users...

            </div>

        </div>

    </main>

</div>

<script type="module" src="js/pages/users.js"></script>

</html>
